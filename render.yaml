services:
  - type: web
    name: veramove-api-demo-zukhriddingit
    runtime: python
    plan: free
    buildCommand: pip install -r services/api/requirements.txt
    startCommand: uvicorn services.api.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_MODE
        value: mock
      - key: LIVE_CALLS_ENABLED
        value: "false"
      - key: REAL_VENDOR_CALLS_ENABLED
        value: "false"
      - key: VENDOR_CONTACT_HASH_SECRET
        sync: false
      - key: VENDOR_CONSENT_MAX_AGE_DAYS
        value: "30"
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_INTAKE_AGENT_ID
        sync: false
      - key: ELEVENLABS_OUTBOUND_AGENT_ID
        sync: false
      - key: ELEVENLABS_PHONE_NUMBER_ID
        sync: false
      - key: ELEVENLABS_WEBHOOK_SECRET
        sync: false
      - key: ELEVENLABS_PRECALL_SECRET
        sync: false
      - key: LIVE_TEST_TO_NUMBERS
        sync: false
      - key: PUBLIC_API_BASE_URL
        sync: false
      - key: RECORDING_SIGNING_SECRET
        sync: false
      - key: VOICE_OPERATOR_SECRET
        sync: false
      - key: AGENT_CONFIG_VERSION
        sync: false
      - key: OPENAI_ENABLED
        value: "false"
      - key: OPENAI_API_KEY
        sync: false
      - key: TAVILY_ENABLED
        value: "false"
      - key: TAVILY_API_KEY
        sync: false
      - key: SUPABASE_ENABLED
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
